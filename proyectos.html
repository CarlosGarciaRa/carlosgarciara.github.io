  <div class="site-sticky-root">
    <div class="navbar-sticky-wrap sticky-top">
      <header class="barra-superior">
        <div class="container container--barra px-3 mt-3">

            <div class="container-fluid align-items-center px-2">
              <a class="navbar-brand navbar-brand-glass mb-0" href="index.html#inicio">flwry.dev</a>
              <button class="navbar-toggler navbar-toggler-glass d-lg-none shadow-none border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas" aria-expanded="false" aria-label="Abrir menú">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="d-none d-lg-flex align-items-center ms-auto gap-2 gap-xl-3">
                <ul class="navbar-nav flex-row align-items-center gap-1 gap-xl-2 mb-0">
                  <li class="nav-item"><a class="nav-link nav-glass-link py-2 px-2" href="index.html#inicio" data-i18n="nav.inicio">Inicio</a></li>
                  <li class="nav-item"><a class="nav-link nav-glass-link py-2 px-2 active" href="proyectos.html" aria-current="page" data-i18n="nav.proyectos">Proyectos</a></li>
                  <li class="nav-item"><a class="nav-link nav-glass-link py-2 px-2" href="experiencia.html" data-i18n="nav.experiencia">Historial laboral</a></li>
                  <li class="nav-item d-flex align-items-center ms-1 ms-xl-2"><a class="btn btn-sm btn-outline-primary nav-cta-pill" href="index.html#contacto" data-i18n="nav.contacto">Contacto</a></li>
                </ul>
                <select class="form-select form-select-sm lang-selector" style="width: auto; max-width: 100px;" aria-label="Idioma">
                  <option value="es">🇲🇽 ES</option>
                  <option value="en">🇺🇸 EN</option>
                </select>
              </div>
            </div>
          </nav>
        </div>
      </header>
    </div>

    <div class="offcanvas offcanvas-fullscreen nav-offcanvas" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel" data-bs-scroll="false">
      <div class="offcanvas-header border-bottom border-white border-opacity-10">
        <p class="offcanvas-title h5 mb-0 navbar-brand-glass" id="navOffcanvasLabel">flwry.dev</p>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar menú"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column">
        <nav class="nav flex-column gap-2 my-2" aria-label="Navegación móvil">
          <a class="nav-mobile-item nav-link nav-glass-link fs-5 py-3 rounded-3" href="index.html#inicio" data-i18n="nav.inicio">Inicio</a>
          <a class="nav-mobile-item nav-link nav-glass-link fs-5 py-3 rounded-3 active" href="proyectos.html" aria-current="page" data-i18n="nav.proyectos">Proyectos</a>
          <a class="nav-mobile-item nav-link nav-glass-link fs-5 py-3 rounded-3" href="experiencia.html" data-i18n="nav.experiencia">Historial laboral</a>
          <a class="nav-mobile-item btn btn-outline-primary nav-cta-pill mt-2 py-3" href="index.html#contacto" data-i18n="nav.contacto">Contacto</a>
        </nav>
        <div class="mt-auto pt-4 border-top border-white border-opacity-10">
          <label class="form-label small text-white-50 mb-2" for="lang-selector-offcanvas">Idioma</label>
          <select id="lang-selector-offcanvas" class="form-select form-select-sm lang-selector lang-selector--offcanvas" aria-label="Idioma">
            <option value="es">🇲🇽 ES</option>
            <option value="en">🇺🇸 EN</option>
          </select>
        </div>
      </div>
    </div>

  <main class="container container--barra py-5">
    <section class="py-5 mt-4">
      <h1 class="bloque__titulo-seccion display-6 fw-bold mb-4" data-i18n="proyectos.titulo">Proyectos</h1>

      <div class="projects-filters mb-4">
        <div class="btn-group flex-wrap" role="group" aria-label="Filtrar proyectos">
          <input type="radio" class="btn-check" name="projectFilter" id="filter-all" value="all" checked>
          <label class="btn btn-outline-primary btn-sm" for="filter-all" data-i18n="proyectos.filtroTodos">Todos</label>
          <input type="radio" class="btn-check" name="projectFilter" id="filter-enterprise" value="enterprise">
          <label class="btn btn-outline-primary btn-sm" for="filter-enterprise" data-i18n="proyectos.filtroEmpresa">Empresa</label>
          <input type="radio" class="btn-check" name="projectFilter" id="filter-personal" value="personal">
          <label class="btn btn-outline-primary btn-sm" for="filter-personal" data-i18n="proyectos.filtroPersonal">Personal</label>
          <input type="radio" class="btn-check" name="projectFilter" id="filter-web" value="web">
          <label class="btn btn-outline-primary btn-sm" for="filter-web" data-i18n="proyectos.filtroWeb">Web</label>
          <input type="radio" class="btn-check" name="projectFilter" id="filter-mobile" value="mobile">
          <label class="btn btn-outline-primary btn-sm" for="filter-mobile" data-i18n="proyectos.filtroMobile">Mobile</label>
        </div>
      </div>

      <div id="projects-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 projects-grid">
        <!-- Las tarjetas se renderizan por JS -->
      </div>
    </section>
  </main>

  <footer class="pie-sitio border-top border-secondary">
    <div class="container container--barra text-center small py-4">
      <p class="mb-1 pie-sitio__texto" data-i18n="footer.nombre">Carlos Adolfo García Ramos</p>
      <p class="mb-0 pie-sitio__texto"><span id="footer-credito"></span></p>
    </div>
  </footer>
  </div>
